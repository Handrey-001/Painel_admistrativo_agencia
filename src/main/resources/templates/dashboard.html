

<div th:fragment="conteudo">

    <style>

        .filtro-container {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .filtro-container input {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 8px;
            border-radius: 6px;
        }

        .btn-filtro {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }


        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card h3 {
            font-size: 14px;
            color: #94a3b8;
        }

        .card h1 {
            font-size: 28px;
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
        }


        canvas {
            background: #1e293b;
            padding: 10px;
            border-radius: 12px;
        }
    </style>

    <h2>📊 Dashboard Empresarial</h2>

    <form method="get" th:action="@{/dashboard}" class="filtro-container">
        <label style="color: #94a3b8;">Selecionar Ano:</label>
        <input type="number" name="ano" th:value="${ano}" placeholder="2026">
        <button type="submit" class="btn-filtro">Atualizar Dados</button>
    </form>

  
    <div class="grid">

        <div class="card">
            <h3>Total de Clientes</h3>
            <h1 th:text="${totalClientes}"></h1>
        </div>

        <div class="card">
            <h3>Clientes Ativos</h3>
            <h1>120</h1> 
        </div>

        <div class="card">
            <h3>Novos Clientes</h3>
            <h1>35</h1> 
        </div>

        <div class="card">
            <h3>Receita Total (Bruta)</h3>
            <h1 th:text="${receitaBruta != null} ? 'R$ ' + ${#numbers.formatDecimal(receitaBruta, 1, 'POINT', 2, 'COMMA')} : 'R$ 0,00'"></h1>
        </div>

        <div class="card">
            <h3>Lucro Total (Saldo)</h3>
            <h1 th:text="${lucroTotal != null} ? 'R$ ' + ${#numbers.formatDecimal(lucroTotal, 1, 'POINT', 2, 'COMMA')} : 'R$ 0,00'"></h1>
        </div>

    </div>

  
    <div class="charts">

        <div class="chart-container">
            <canvas id="graficoBarra"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="graficoPizza"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="graficoReceita"></canvas>
        </div>

    </div>

    

    <script th:inline="javascript">
    /*<![CDATA[*/
    // Força o código a esperar a página (e o Chart.js) carregar completamente
    window.addEventListener('load', function() {
        
        // Captura os dados do Java
        const dadosClientes = /*[[${dados}]]*/ [];
        const dadosReceita = /*[[${receita}]]*/ [];

        console.log("Dashboard: Iniciando renderização...");
        console.log("Clientes:", dadosClientes);
        console.log("Receita:", dadosReceita);

        // Gráfico de Barras 
        const ctxBarra = document.getElementById('graficoBarra');
        if (ctxBarra) {
            new Chart(ctxBarra, {
                type: 'bar',
                data: {
                    labels: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
                    datasets: [{
                        label: 'Clientes',
                        backgroundColor: '#60a5fa',
                        data: dadosClientes
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // Gráfico de Linha 
        const ctxReceita = document.getElementById('graficoReceita');
        if (ctxReceita) {
            new Chart(ctxReceita, {
                type: 'line',
                data: {
                    labels: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
                    datasets: [{
                        label: 'Receita (R$)',
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.3,
                        data: dadosReceita
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        // Gráfico de Pizza
        const ctxPizza = document.getElementById('graficoPizza');
        if (ctxPizza) {
            new Chart(ctxPizza, {
                type: 'pie',
                data: {
                    labels: ['Ativos', 'Inativos'],
                    datasets: [{
                        backgroundColor: ['#10b981', '#f87171'],
                        data: [120, 35] 
                    }]
                }
            });
        }
    });
   /*]]>*/
  </script>

</div>
